name: Test

on: pull_request

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        uses: gcr.io/cloud-builders/bazel:7.3.2
        entrypoint: bash
        with:
          args: ./scripts/run_tests

      - name: Run integration tests
        uses: gcr.io/cloud-builders/bazel:7.3.2
        entrypoint: bash
        with:
          args: ./scripts/run_integration_tests
